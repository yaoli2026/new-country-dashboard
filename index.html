<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新国家产品链接状态汇总每日</title>
<style>
:root{
  --bg:#f0f2f5;--card:#fff;--header:#0a2342;
  --border:#dee2e6;--row-hover:#f0f7ff;
  --active:#1a6b3a;--active-bg:#d1fae5;
  --inactive:#92400e;--inactive-bg:#fef3c7;
  --missing:#991b1b;--missing-bg:#fee2e2;
  --incomplete:#4c1d95;--incomplete-bg:#ede9fe;
  --null-fg:#555;--null-bg:#f3f4f6;
  --pos:#16a34a;--neg:#dc2626;
  --gap:14px;--r:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:#212529;font-size:13px;}
.wrap{max-width:100%;margin:0 auto;padding:var(--gap);}
.page-header{background:var(--header);color:#fff;padding:16px 24px;border-radius:var(--r);margin-bottom:var(--gap);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.page-header h1{font-size:16px;font-weight:700;}
.meta{font-size:11px;opacity:.75;}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:var(--gap);}
.filter-group{display:flex;align-items:center;gap:6px;background:var(--card);padding:7px 12px;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.filter-group label{font-size:11px;color:#6c757d;white-space:nowrap;}
.filter-group select{border:none;outline:none;font-size:12px;background:transparent;color:#212529;cursor:pointer;}
.table-wrap{background:var(--card);border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.1);overflow-x:auto;}
.table-title{padding:14px 18px 10px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border);}
table{width:auto;border-collapse:collapse;white-space:nowrap;}
.col-market{width:50px;min-width:50px;}
.col-site{width:46px;min-width:46px;}
.col-status{width:88px;min-width:88px;}
thead tr:first-child th{background:#1e3a5f;color:#fff;font-size:11px;font-weight:700;text-align:center;padding:10px 6px;border-right:1px solid rgba(255,255,255,.15);letter-spacing:.3px;position:sticky;top:0;z-index:10;}
thead tr:first-child th.sticky-market{position:sticky;left:0;z-index:20;background:#1e3a5f;}
thead tr:first-child th.sticky-site{position:sticky;left:50px;z-index:20;background:#1e3a5f;}
thead tr:first-child th.sticky-status{position:sticky;left:96px;z-index:20;background:#1e3a5f;}
thead tr:nth-child(2) th{background:#f8f9fa;color:#6c757d;font-size:10px;font-weight:600;text-align:center;padding:5px 4px;border-right:1px solid var(--border);border-bottom:2px solid var(--border);position:sticky;top:37px;z-index:10;}
thead tr:nth-child(2) th.sticky-market{position:sticky;left:0;z-index:20;background:#f8f9fa;}
thead tr:nth-child(2) th.sticky-site{position:sticky;left:50px;z-index:20;background:#f8f9fa;}
thead tr:nth-child(2) th.sticky-status{position:sticky;left:96px;z-index:20;background:#f8f9fa;}
tbody td{border-right:1px solid var(--border);border-bottom:1px solid #f0f0f0;vertical-align:middle;}
td.sticky-market{position:sticky;left:0;z-index:5;background:#f8f9fa;font-weight:700;text-align:center;padding:8px 4px;border-right:2px solid var(--border);}
td.sticky-site{position:sticky;left:50px;z-index:5;background:#f8f9fa;font-weight:600;text-align:center;padding:8px 4px;border-right:1px solid var(--border);}
td.sticky-status{position:sticky;left:96px;z-index:5;background:#fff;padding:6px 10px;border-right:2px solid var(--border);}
tbody tr:hover td{background:#f0f7ff!important;}
tbody tr:hover td.sticky-market,tbody tr:hover td.sticky-site,tbody tr:hover td.sticky-status{background:#e8f0fe!important;}
.status-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.pill-active{background:var(--active-bg);color:var(--active);}
.pill-inactive{background:var(--inactive-bg);color:var(--inactive);}
.pill-missing{background:var(--missing-bg);color:var(--missing);}
.pill-incomplete{background:var(--incomplete-bg);color:var(--incomplete);}
.pill-null{background:var(--null-bg);color:var(--null-fg);}
.data-cell{text-align:right;padding:5px 8px;min-width:72px;}
.cnt-val{font-size:13px;font-weight:600;}
.delta{font-size:11px;font-weight:500;margin-top:1px;}
.delta.pos{color:var(--pos);}
.delta.neg{color:var(--neg);}
.delta.zero{color:#9ca3af;}
tr.subtotal-row td{background:#eef2ff;font-weight:700;}
tr.subtotal-row td.sticky-market,tr.subtotal-row td.sticky-site{background:#dde3f7;}
tr.subtotal-row td.sticky-status{background:#dde3f7;font-size:11px;color:#4338ca;}
tr.site-sep td{border-top:2px solid #c7d2fe;}
footer{text-align:center;font-size:11px;color:#9ca3af;padding:12px 0;}
</style>
</head>

  <div class="table-wrap">

    <div id="table-container"></div>
  </div>
</div>
<footer>AZ Market Link Status · 每日自动更新</footer>

const STATUS_ORDER = ['active','inactive','missing','incomplete',null];
function pillClass(s){return {active:'pill-active',inactive:'pill-inactive',missing:'pill-missing',incomplete:'pill-incomplete'}[s]||'pill-null';}
function pillLabel(s){return s||'(未知)';}
function fmt(n){if(n===null||n===undefined)return '<span style="color:#bbb">—</span>';return Number(n).toLocaleString();}
function deltaHtml(delta){
  if(delta===null||delta===undefined)return '';
  if(delta===0)return '<div class="delta zero">±0</div>';
  const sign=delta>0?'+':'';
  const cls=delta>0?'pos':'neg';
  return `<div class="delta ${cls}">${sign}${delta.toLocaleString()}</div>`;
}
function renderTable(){
  const days=parseInt(document.getElementById('f-days').value);
  const fSite=document.getElementById('f-site').value;
  const fStatus=document.getElementById('f-status').value;
  let allDates=[...new Set(RAW.map(r=>r.sync_date))].sort().reverse();
  allDates=allDates.slice(0,days);
  const dateCols=allDates;
  const lookup={};
  RAW.forEach(r=>{
    const site=r.site,status=r.mkpStatus,d=r.sync_date;
    if(!lookup[site])lookup[site]={};
    if(!lookup[site][status])lookup[site][status]={};
    lookup[site][status][d]=(lookup[site][status][d]||0)+Number(r.cnt);
  });
  let sites=['AE','MX','SA'];
  if(fSite)sites=[fSite];
  let statuses=STATUS_ORDER;
  if(fStatus)statuses=[fStatus||null];
  let html='<table><thead><tr>';
  html+='<th class="sticky-market col-market">市场</th>';
  html+='<th class="sticky-site col-site">站点</th>';
  html+='<th class="sticky-status col-status">链接状态</th>';
  dateCols.forEach(d=>{html+=`<th style="min-width:90px">${d}</th>`;});
  html+='</tr><tr>';
  html+='<th class="sticky-market"></th><th class="sticky-site"></th><th class="sticky-status"></th>';
  dateCols.forEach((d,i)=>{html+=`<th style="min-width:90px">${i===dateCols.length-1?'数量':'数量 / 环比'}</th>`;});
  html+='</tr></thead><tbody>';
  let firstSite=true;
  let firstRow=true;
  sites.forEach(site=>{
    const siteStatuses=statuses.filter(s=>s!==null&&lookup[site]&&lookup[site][s]!==undefined);
    if(!siteStatuses.length)return;
    let si=0;
    siteStatuses.forEach(status=>{
      const rowData=(lookup[site]&&lookup[site][status])||{};
      const rowClass=(!firstSite&&si===0)?'site-sep':'';
      html+=`<tr class="${rowClass}">`;
      html+=`<td class="sticky-market">${firstRow?'AZ':''}</td>`;
      html+=`<td class="sticky-site">${si===0?site:''}</td>`;
      firstRow=false;
      html+=`<td class="sticky-status"><span class="status-pill ${pillClass(status)}">${pillLabel(status)}</span></td>`;
      dateCols.forEach((d,i)=>{
        const cnt=rowData[d]??null;
        const nextDate=dateCols[i+1];
        const prevCnt=nextDate?(rowData[nextDate]??null):null;
        const delta=(cnt!==null&&prevCnt!==null)?(cnt-prevCnt):null;
        html+=`<td class="data-cell"><div class="cnt-val">${fmt(cnt)}</div>${i<dateCols.length-1?deltaHtml(delta):''}</td>`;
      });
      html+='</tr>';
      si++;
    });
    if(!fStatus){
      html+='<tr class="subtotal-row">';
      html+=`<td class="sticky-market"></td><td class="sticky-site">${site}</td><td class="sticky-status">▸ 小计</td>`;
      dateCols.forEach((d,i)=>{
        let total=0;
        (lookup[site]?Object.values(lookup[site]):[]).forEach(m=>{total+=m[d]||0;});
        const nextDate=dateCols[i+1];
        let prevTotal=null;
        if(nextDate){prevTotal=0;(lookup[site]?Object.values(lookup[site]):[]).forEach(m=>{prevTotal+=m[nextDate]||0;});}
        const delta=prevTotal!==null?total-prevTotal:null;
        html+=`<td class="data-cell"><div class="cnt-val">${fmt(total)}</div>${i<dateCols.length-1?deltaHtml(delta):''}</td>`;
      });
      html+='</tr>';
    }
    firstSite=false;
  });
  html+='</tbody></table>';
  document.getElementById('table-container').innerHTML=html;
}
renderTable();
