<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.login-box{background:#fff;border-radius:12px;padding:40px 36px;box-shadow:0 4px 24px rgba(0,0,0,.12);text-align:center;max-width:380px;width:90%;}
.login-box h1{font-size:18px;color:#0a2342;margin-bottom:6px;}
.login-box .sub{font-size:13px;color:#6c757d;margin-bottom:24px;}
.login-box input{width:100%;padding:10px 14px;border:1px solid #dee2e6;border-radius:6px;font-size:14px;outline:none;transition:border .2s;}
.login-box input:focus{border-color:#4C72B0;}
.login-box button{margin-top:14px;width:100%;padding:10px;background:#0a2342;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;transition:background .2s;}
.login-box button:hover{background:#163a6a;}
.err{color:#dc3545;font-size:12px;margin-top:10px;display:none;}
</style>

function b64(s){const b=atob(s),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
async function deriveKey(pwd){
  const enc=new TextEncoder();
  const keyMaterial=await crypto.subtle.importKey('raw',enc.encode(pwd),{name:'PBKDF2'},false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:100000,hash:'SHA-256'},keyMaterial,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function doUnlock(){
  const pwd=document.getElementById('pwd').value;
  if(!pwd)return;
  try{
    const key=await deriveKey(pwd);
    const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(CT));
    const html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('errMsg').style.display='block';
    document.getElementById('pwd').select();
  }
}
